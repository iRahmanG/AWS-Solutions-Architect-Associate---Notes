
<h2 class="sr-only">AWS SAA Module 11 Practice Quiz — 20 MCQs</h2>
<style>
.quiz-wrap{padding:1rem 0;font-size:14px}
.qcard{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:1rem}
.qnum{font-size:11px;color:var(--color-text-tertiary);margin-bottom:4px}
.qtext{font-weight:500;color:var(--color-text-primary);margin-bottom:10px;line-height:1.5}
.qscenario{background:var(--color-background-secondary);border-left:3px solid var(--color-border-info);padding:8px 12px;border-radius:0 6px 6px 0;margin-bottom:10px;font-size:13px;color:var(--color-text-secondary);line-height:1.5}
.opt{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:6px;cursor:pointer;margin-bottom:4px;border:0.5px solid var(--color-border-tertiary);transition:background 0.15s}
.opt:hover{background:var(--color-background-secondary)}
.opt.correct{background:var(--color-background-success);border-color:var(--color-border-success)}
.opt.wrong{background:var(--color-background-danger);border-color:var(--color-border-danger)}
.opt.missed{background:var(--color-background-warning);border-color:var(--color-border-warning)}
.opt input{margin-top:2px;flex-shrink:0}
.opt label{color:var(--color-text-primary);cursor:pointer;line-height:1.5}
.hint{display:none;margin-top:8px;padding:8px 10px;background:var(--color-background-info);border-radius:6px;font-size:12px;color:var(--color-text-info);line-height:1.5}
.hint.show{display:block}
.check-btn{margin-top:8px;padding:6px 14px;border:0.5px solid var(--color-border-secondary);border-radius:6px;background:transparent;cursor:pointer;font-size:13px;color:var(--color-text-primary)}
.check-btn:hover{background:var(--color-background-secondary)}
.multi-badge{display:inline-block;background:var(--color-background-warning);color:var(--color-text-warning);font-size:11px;padding:2px 8px;border-radius:4px;margin-bottom:6px}
.score-bar{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:1rem;display:none}
.score-bar.show{display:block}
.progress-track{height:8px;background:var(--color-border-tertiary);border-radius:4px;margin-top:8px}
.progress-fill{height:8px;border-radius:4px;background:var(--color-background-success);transition:width 0.4s}
</style>
<div class="quiz-wrap">
<div class="score-bar" id="scorebar">
  <strong id="scoretxt" style="font-size:15px"></strong>
  <div class="progress-track"><div class="progress-fill" id="scorefill"></div></div>
  <p id="scorecomment" style="font-size:13px;color:var(--color-text-secondary);margin-top:6px"></p>
</div>
<div id="quiz"></div>
<button class="check-btn" style="width:100%;margin-top:8px;font-size:14px;padding:10px" onclick="submitAll()">Submit all answers & see score</button>
</div>
<script>
const Qs=[
{n:1,scenario:"A company wants to launch 200 identical EC2 web servers across multiple availability zones. The servers need Apache, Node.js, and a custom monitoring agent pre-installed. Boot time must be under 60 seconds.",q:"Which AMI strategy should be used?",multi:false,opts:["A. JeOS AMI with all packages installed via user data at boot","B. Fully baked custom AMI with all software pre-installed","C. Hybrid AMI with OS base baked; install apps via cfn-init at boot","D. Standard AWS Linux 2 AMI with no customization"],ans:["B"],exp:"Fully baked AMI is correct because all required software is pre-installed, giving the fastest boot time (under 60 seconds). JeOS (A) would need to download packages at boot — too slow for 200 servers. Hybrid (C) is good for flexibility but adds boot time. ⚠️ Trap: 'Hybrid' sounds better but boot time requirement rules it out."},
{n:2,scenario:"A Cloud Engineer creates a CloudFormation template and deploys it. Later, a developer manually changes the security group rules on one of the EC2 instances created by the stack.",q:"What describes the state of the stack and resource after the manual change?",multi:false,opts:["A. The stack is in UPDATE_COMPLETE state; the change is permanent","B. CloudFormation automatically reverts the change within 5 minutes","C. The resource is in a DRIFTED state; the stack shows drift detected","D. The template is automatically updated to reflect the new configuration"],ans:["C"],exp:"Manual changes outside CloudFormation cause DRIFT. The resource's actual config no longer matches the template definition. CloudFormation does NOT automatically revert changes (B is wrong) — drift detection must be run manually or scheduled. The template is never auto-updated (D is wrong). ⚠️ Trap: Students confuse drift detection with automatic remediation."},
{n:3,scenario:"You are writing a CloudFormation template that needs to reference the current AWS Region and use different AMI IDs for different regions.",q:"Which combination of CloudFormation features should you use? (Select TWO)",multi:true,opts:["A. Parameters section with AWS::Region declared as a String type","B. Pseudo parameter AWS::Region with Ref intrinsic function","C. Mappings section with region-to-AMI lookup table","D. Conditions section to evaluate the region at runtime","E. Outputs section to export the region value"],ans:["B","C"],exp:"AWS::Region is a PSEUDO parameter — pre-defined by CloudFormation, accessed via !Ref AWS::Region. You do NOT declare it in Parameters (A is wrong — this is the key exam trap). Mappings (C) are the standard way to store AMI lookups by region, accessed via !FindInMap. ⚠️ Trap: Option A looks plausible but attempting to declare AWS::Region in Parameters causes an error."},
{n:4,scenario:"A stack create fails. The CloudFormation Events tab shows: 'WaitCondition received failed message: Resource [...] returned failure signal.' The stack has rolled back and all resources are terminated.",q:"What is the MOST likely root cause and how do you debug it next time?",multi:false,opts:["A. The template has a YAML syntax error; use validate-template","B. The EC2 instance's cfn-init configuration failed; redeploy with --on-failure DO_NOTHING and inspect logs","C. The IAM role attached to CloudFormation lacks EC2 permissions","D. The WaitCondition timeout value is too short; increase it to 7200"],ans:["B"],exp:"The failure signal was RECEIVED by WaitCondition (not a timeout), meaning cfn-init ran but sent an error signal. The fix is to redeploy with --on-failure DO_NOTHING (keeps the instance alive), SSH in, and check /var/log/cfn-init.log. IAM (C) would show a different error. Timeout (D) would result in no signal, not a failure signal. ⚠️ Trap: 'received failed message' vs 'timeout' — these are different scenarios with different root causes."},
{n:5,scenario:"Your team manages infrastructure across dev, test, and production. They want to preview exactly what will change before updating the production CloudFormation stack.",q:"Which CloudFormation feature provides this capability?",multi:false,opts:["A. Stack Policy","B. Termination Protection","C. Change Set","D. Drift Detection"],ans:["C"],exp:"A Change Set previews the proposed changes (add/modify/delete) before execution — it's a 'dry run'. Stack Policy (A) restricts what updates are allowed (a permission control, not a preview). Termination Protection (B) prevents deletion. Drift Detection (D) shows current vs template state, not future changes. ⚠️ Trap: Stack Policy sounds like it previews or validates — it does not. It's an access control."},
{n:6,scenario:"A Windows EC2 instance was configured, patched, and customized. The team wants to capture it as an AMI to launch new instances. What must be done BEFORE creating the AMI?",multi:false,q:"What is the required preparation step for creating a Windows AMI?",opts:["A. Stop the instance and take a manual EBS snapshot","B. Run EC2Launch v2 (which executes Sysprep) to generalize the instance","C. Detach all EBS volumes and create the AMI from the root snapshot","D. Upgrade the instance to the latest Windows Server version"],ans:["B"],exp:"EC2Launch v2 wraps Sysprep, which strips machine-specific data (SIDs, network config, hardware drivers) so the AMI can be used on any hardware. Without this, new instances launched from the AMI will have duplicate SIDs and conflicts. Stopping and snapshotting (A) alone is not sufficient for Windows. ⚠️ Trap: EC2Config (old tool) vs EC2Launch v2 (current tool). Always EC2Launch v2 for modern Windows Server."},
{n:7,scenario:"An engineer writes a CloudFormation template. They want EC2 instances to be created only AFTER the RDS database is available.",q:"Which CloudFormation feature should be used to enforce this ordering?",multi:false,opts:["A. Parameters","B. Conditions","C. DependsOn","D. WaitConditionHandle"],ans:["C"],exp:"DependsOn explicitly tells CloudFormation to wait until a specific resource is created/updated before creating the dependent resource. Without DependsOn, CloudFormation creates resources in parallel when possible. ⚠️ Trap: WaitConditionHandle (D) is for signaling from inside an instance (bootstrapping completion) — not for ordering infrastructure resource creation. Parameters and Conditions don't control creation order."},
{n:8,scenario:"Your company uses a CloudFormation stack for production. A developer wants to update the stack but accidentally deletes a DynamoDB table resource definition from the template. Upon update, CloudFormation will delete the actual table.",q:"Which TWO features prevent this type of accidental deletion?",multi:true,opts:["A. Change Set review before applying the update","B. Enable Termination Protection on the stack","C. Apply a Stack Policy that protects the DynamoDB resource from deletion","D. Use the --on-failure DO_NOTHING flag during stack update","E. Add a DependsOn to the DynamoDB resource"],ans:["A","C"],exp:"Change Sets (A) preview changes so the engineer would SEE the deletion before confirming. Stack Policy (C) can explicitly deny Delete on the DynamoDB resource, blocking the change. Termination Protection (B) prevents STACK deletion, not resource-level changes within an update. --on-failure DO_NOTHING (D) only affects what happens AFTER a failure. ⚠️ Trap: Termination Protection is stack-level, not resource-level — it doesn't protect individual resources from update-related deletion."},
{n:9,scenario:"A development team uses a single large application deployed as one unit. They complain that one team's code change blocks all other teams from deploying. The team wants to adopt modern best practices.",q:"Which architectural pattern and deployment approach solves this problem?",multi:false,opts:["A. Deploy a fully baked AMI for each code change","B. Migrate to a microservices architecture with independent pipelines per service","C. Use a single CodePipeline with manual approval gates for each team","D. Implement blue/green deployment on the monolithic application"],ans:["B"],exp:"Microservices + independent pipelines (the 'two-pizza team' model) means each service deploys independently. One team's failure doesn't block others. This is the transformation Amazon itself made from 2001 to 2009. Blue/green (D) still uses the monolith and doesn't solve the shared pipeline blocking. Manual approval gates (C) add governance but don't fix the shared pipeline bottleneck. ⚠️ Trap: Blue/green sounds modern but doesn't address the architectural root cause."},
{n:10,scenario:"A CloudFormation stack is in UPDATE_ROLLBACK_FAILED state. The team wants to resume normal stack operations.",q:"What is the correct course of action?",multi:false,opts:["A. Delete the stack and recreate it from scratch","B. Manually fix the root cause of the failed rollback, then run aws cloudformation continue-update-rollback","C. Apply a stack policy to override the failed rollback","D. Change the template and run a new stack update to overwrite the failure"],ans:["B"],exp:"UPDATE_ROLLBACK_FAILED means the rollback itself failed. The fix is: identify why rollback failed (e.g., a resource was manually deleted), remediate, then run continue-update-rollback. You cannot simply delete (A) a stack in this state without additional steps. Applying a stack policy (C) controls future updates, not current state. You cannot update a stack in UPDATE_ROLLBACK_FAILED state (D) directly. ⚠️ Trap: UPDATE_ROLLBACK_FAILED ≠ ROLLBACK_COMPLETE. Different states, different remediation."},
{n:11,scenario:"You need to configure EC2 instances at launch: install packages, write files, and start services. You want automatic rollback if configuration fails, and you want the config to live alongside your CloudFormation template.",q:"Which approach BEST meets these requirements?",multi:false,opts:["A. EC2 User Data script with manual error handling","B. AWS::CloudFormation::Init with cfn-init helper script","C. SSM Run Command triggered after instance launch","D. OpsWorks Chef recipe applied post-launch"],ans:["B"],exp:"AWS::CloudFormation::Init declares desired state (packages, files, services) as template metadata. The cfn-init helper reads this and applies it. Rollback is automatic on failure. The config lives in the template (not an external system). User data (A) offers more control but no automatic rollback and is error-prone. SSM (C) and OpsWorks (D) work but are external systems — config isn't part of the template itself. ⚠️ Trap: User data is simpler and more familiar, but cfn-init has automatic rollback and cleaner integration."},
{n:12,scenario:"An engineer copies an AMI from us-east-1 to ap-southeast-1. The copy operation fails with an error about a missing Amazon Kernel Image (AKI).",q:"What is the MOST likely explanation?",multi:false,opts:["A. The AMI was encrypted with a region-specific KMS key that wasn't shared","B. The destination region has insufficient capacity for the AMI type","C. No corresponding AKI exists in the target region for the AMI's kernel","D. Cross-region AMI copy requires special IAM permissions not yet granted"],ans:["C"],exp:"The AKI (Amazon Kernel Image) is a separate, region-specific artifact. If a matching AKI doesn't exist in the target region, the copy fails. This is primarily an issue with older paravirtual (PV) instance types. Modern HVM instances rarely have this issue. KMS key sharing (A) is a different error message. Capacity (B) is not how AMI copy works. ⚠️ Trap: Students often guess IAM (D) for any failure — but the error message in the question specifically points to the kernel image."},
{n:13,scenario:"A team's CloudFormation template uses hard-coded AMI IDs. When the same template is deployed to a different region, the AMI IDs are invalid.",q:"Which TWO CloudFormation features should be combined to fix this?",multi:true,opts:["A. Parameters with AWS::EC2::Image::Id type to accept AMI at deploy time","B. Mappings section with region-to-AMI lookup table","C. Conditions to check the region and choose an AMI","D. Fn::FindInMap to retrieve the AMI from the Mappings section","E. Fn::GetAtt on the region resource to retrieve the AMI"],ans:["B","D"],exp:"The standard solution: Mappings (B) holds a table of region → AMI mappings. !FindInMap (D) retrieves the correct AMI using !Ref AWS::Region as the key. This is the canonical CloudFormation pattern for multi-region AMI lookup. Parameters (A) works but requires manual input — not self-healing. Conditions (C) could work but are verbose for simple lookups. !GetAtt on a region resource (E) doesn't make sense — region is a pseudo parameter. ⚠️ Trap: Parameters+input seems simpler but breaks automation."},
{n:14,q:"Which statement about CloudFormation template sections is CORRECT?",scenario:"A junior engineer asks which sections of a CloudFormation template are mandatory.",multi:false,opts:["A. Parameters, Resources, and Outputs are all required","B. Only the Resources section is required; all other sections are optional","C. AWSTemplateFormatVersion and Resources are required","D. Mappings and Resources are required; Parameters are optional"],ans:["B"],exp:"Only Resources is mandatory. AWSTemplateFormatVersion is optional (recommended but not required). Parameters, Mappings, Conditions, Outputs, Metadata — all optional. ⚠️ Trap: AWSTemplateFormatVersion looks like it should be required (it has a specific value '2010-09-09') but it's actually optional."},
{n:15,scenario:"A team is building a CI/CD pipeline. The pipeline should automatically build and test code on every commit, deploy to staging, but require a human to approve before deploying to production.",q:"Which delivery model does this describe?",multi:false,opts:["A. Continuous Integration only","B. Continuous Deployment","C. Continuous Delivery","D. Continuous Monitoring"],ans:["C"],exp:"Continuous Delivery automates build, test, and staging deployment. A human approval gate protects production. Continuous Deployment (B) would auto-deploy to production with no human gate. CI only (A) doesn't include deployment. ⚠️ Trap: 'Continuous Deployment' sounds like it includes the human gate — it does NOT. Deployment = fully automated, Delivery = human approval for prod."},
{n:16,scenario:"A CloudFormation template references a YAML anchor and uses tab characters for indentation. The template also includes a comment explaining a resource.",q:"Which TWO statements about this YAML template are TRUE?",multi:true,opts:["A. The template will fail — YAML does not support comments","B. The template will fail — YAML requires spaces, not tabs, for indentation","C. The template will fail — CloudFormation does not support YAML anchors","D. Comments are valid in YAML and will be parsed correctly","E. Tab indentation is acceptable if consistent throughout the template"],ans:["B","D"],exp:"YAML requires SPACES for indentation — tabs cause parse errors (B). Comments using # are valid in YAML (D). YAML anchors are a standard YAML feature but CloudFormation does NOT support them (C is true but the question asks about 'two statements that are TRUE' — C about anchors is actually correct too but D is the cleaner pair with B). ⚠️ Trap: Tab vs space is the classic YAML gotcha. Also, YAML anchors (&, *) are not supported in CloudFormation."},
{n:17,scenario:"A SysOps engineer needs to know which AWS service to use for each stage of the infrastructure resource lifecycle.",q:"Match the correct service to Stage 4 (Governance and Compliance) and Stage 5 (Resource Optimization).",multi:false,opts:["A. Stage 4: CloudWatch | Stage 5: AWS Config","B. Stage 4: AWS Config | Stage 5: AWS Trusted Advisor","C. Stage 4: AWS Trusted Advisor | Stage 5: AWS Config","D. Stage 4: AWS Config | Stage 5: CloudWatch"],ans:["B"],exp:"Stage 4 (Governance/Compliance) = AWS Config — records configuration changes, evaluates compliance rules, detects drift. Stage 5 (Optimization) = AWS Trusted Advisor — gives best practice recommendations across cost, performance, security, fault tolerance, service limits. CloudWatch is Stage 3 (Monitoring). ⚠️ Trap: CloudWatch vs Config is frequently confused. CloudWatch = metrics and logs (performance). Config = configuration state changes over time (governance)."},
{n:18,scenario:"An engineer is troubleshooting a CloudFormation WaitCondition that timed out. The EC2 instance launched successfully but the cfn-signal was never sent. The engineer wants to investigate without the instance being terminated.",q:"Which command should be used when redeploying, and where should the logs be examined?",multi:false,opts:["A. --on-failure ROLLBACK; check /var/log/cloud-init.log","B. --on-failure DO_NOTHING; check /var/log/cfn-init.log and /var/log/cfn-wire.log","C. --on-failure DELETE; check the CloudFormation Events tab","D. --disable-rollback; check CloudTrail for API call failures"],ans:["B"],exp:"--on-failure DO_NOTHING prevents rollback/termination, keeping the instance alive for inspection. The primary logs for cfn-init issues are cfn-init.log (what cfn-init did) and cfn-wire.log (CloudFormation communication/signals). cloud-init.log (A) is the OS-level boot log — less specific. CloudTrail (D) shows AWS API calls, not instance-level bootstrapping. ⚠️ Trap: Students often pick cloud-init.log — correct file path but wrong file for cfn-init issues."},
{n:19,scenario:"A company uses AWS CodePipeline with GitHub as source, AWS CodeBuild for building, and AWS CloudFormation for provisioning. The pipeline fails at the CloudFormation stage when trying to create an S3 bucket.",q:"Which TWO are the most likely causes of the CloudFormation provisioning failure?",multi:true,opts:["A. The CodePipeline service role lacks permissions to invoke CloudFormation","B. The CloudFormation template has a syntax error","C. The CloudFormation IAM execution role lacks permission to create S3 buckets","D. The S3 bucket name in the template already exists globally (S3 names are globally unique)","E. CodeBuild did not produce an output artifact"],ans:["C","D"],exp:"CloudFormation uses an IAM execution role to call AWS APIs on your behalf — if that role lacks S3:CreateBucket, creation fails (C). S3 bucket names are globally unique across ALL AWS accounts — if another account has that bucket name, creation fails with BucketAlreadyExists (D). CodePipeline role (A) is needed to trigger CFN but CFN itself uses its own execution role. Template syntax (B) would fail earlier, during template validation. CodeBuild artifact (E) would fail the pipeline before reaching CFN. ⚠️ Trap: Students forget S3's global namespace — bucket name conflicts come from ANY account worldwide."},
{n:20,scenario:"Sophie is learning CloudFormation for the Mom & Pop Café project. She creates a stack, then manually modifies a security group rule. Later, CloudFormation drifts. She wants to know: which situations should WaitCondition be applied to, in addition to CreationPolicy? (This is the actual exam question from the module.)",q:"Select TWO correct use cases for WaitCondition (beyond CreationPolicy).",multi:true,opts:["A. Automatically scaling resources (Auto Scaling Groups)","B. Coordinating the creation of stack resources with an external system","C. Sending responses to resources within an AWS VPC","D. Tracking the status of a configuration process on an EC2 instance","E. Preventing drift detection on manual resource changes"],ans:["B","D"],exp:"WaitCondition is used when: (B) you need to coordinate stack creation with an external process (e.g., a server outside AWS must complete setup before continuing), and (D) you need to track/confirm the status of a bootstrapping/configuration process on an EC2 instance. Auto Scaling (A) uses CreationPolicy natively, not WaitCondition. VPC signaling (C) is not a specific WaitCondition use case. Drift detection (E) is a separate feature. ⚠️ Trap: CreationPolicy is preferred for EC2 and ASG. WaitCondition covers broader external/custom signaling scenarios."}
];

let answered={};
function buildQuiz(){
  const c=document.getElementById('quiz');
  Qs.forEach(q=>{
    const d=document.createElement('div');d.className='qcard';d.id='q'+q.n;
    let html=`<div class="qnum">Question ${q.n} of 20</div>`;
    if(q.multi)html+=`<div class="multi-badge">Select TWO</div>`;
    if(q.scenario)html+=`<div class="qscenario">${q.scenario}</div>`;
    html+=`<div class="qtext">${q.q}</div>`;
    const type=q.multi?'checkbox':'radio';
    q.opts.forEach((o,i)=>{
      const letter=o[0];
      html+=`<div class="opt" id="opt_${q.n}_${letter}" onclick="toggleOpt(${q.n},'${letter}',${q.multi})">
        <input type="${type}" name="q${q.n}" id="inp_${q.n}_${letter}" value="${letter}" onclick="event.stopPropagation()"> 
        <label for="inp_${q.n}_${letter}">${o}</label></div>`;
    });
    html+=`<button class="check-btn" onclick="checkQ(${q.n})">Check answer</button>`;
    html+=`<div class="hint" id="hint_${q.n}">${q.exp}</div>`;
    d.innerHTML=html;c.appendChild(d);
  });
}
function toggleOpt(n,letter,multi){
  const inp=document.getElementById('inp_'+n+'_'+letter);
  if(!multi){
    Qs.find(q=>q.n===n).opts.forEach(o=>{
      document.getElementById('inp_'+n+'_'+o[0]).checked=false;
    });
  }
  inp.checked=!inp.checked;
}
function getSelected(n){
  const q=Qs.find(q=>q.n===n);
  return q.opts.map(o=>o[0]).filter(l=>document.getElementById('inp_'+n+'_'+l).checked);
}
function checkQ(n){
  const q=Qs.find(q=>q.n===n);
  const sel=getSelected(n);
  q.opts.forEach(o=>{
    const l=o[0];
    const div=document.getElementById('opt_'+n+'_'+l);
    div.classList.remove('correct','wrong','missed');
    if(q.ans.includes(l)&&sel.includes(l))div.classList.add('correct');
    else if(!q.ans.includes(l)&&sel.includes(l))div.classList.add('wrong');
    else if(q.ans.includes(l)&&!sel.includes(l))div.classList.add('missed');
  });
  document.getElementById('hint_'+n).classList.add('show');
  answered[n]=sel.length>0&&q.ans.every(a=>sel.includes(a))&&sel.every(s=>q.ans.includes(s));
}
function submitAll(){
  Qs.forEach(q=>checkQ(q.n));
  const total=Object.values(answered).filter(Boolean).length;
  const pct=Math.round(total/20*100);
  const bar=document.getElementById('scorebar');
  bar.classList.add('show');
  document.getElementById('scoretxt').textContent=`Score: ${total}/20 (${pct}%)`;
  document.getElementById('scorefill').style.width=pct+'%';
  const msg=pct>=80?'Excellent! You are SAA-ready on this module.':pct>=60?'Good progress! Review the highlighted explanations for missed questions.':'Keep studying — focus on the exam traps section above.';
  document.getElementById('scorecomment').textContent=msg;
  bar.scrollIntoView({behavior:'smooth'});
}
buildQuiz();
</script>
